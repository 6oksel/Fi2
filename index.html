<!DOCTYPE html>
<html lang="tr" data-theme="auto">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>FitApp</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#f5f4f0;--bg2:#ebe9e3;--surface:#fff;--surface2:#f0eee9;--border:#d8d5cd;--text:#1a1917;--text2:#6b6860;--accent:#e8501a;--accent-bg:#fde8e0;--green:#2d8a4e;--green-bg:#e0f5e9;--blue:#1a6fb5;--blue-bg:#ddeeff;--yellow:#c47d00;--yellow-bg:#fff3d0;--purple:#7c3aed;--purple-bg:#ede9fe;--red:#e53935;--red-bg:#fdecea;--shadow:0 2px 12px rgba(0,0,0,.08);--shadow-lg:0 8px 32px rgba(0,0,0,.14);--radius:16px;--radius-sm:10px;--nav-h:72px;--header-h:56px;--font-display:'Syne',sans-serif;--font-body:'DM Sans',sans-serif;--transition:.2s ease}
[data-theme=dark]{--bg:#111210;--bg2:#1a1917;--surface:#222220;--surface2:#2a2927;--border:#3a3835;--text:#f0ede8;--text2:#8a8780;--accent:#ff6a35;--accent-bg:#3a1a0e;--green:#3dba68;--green-bg:#0e2e1a;--blue:#4a9ee0;--blue-bg:#0e2035;--yellow:#f0a830;--yellow-bg:#2a1e00;--purple:#a78bfa;--purple-bg:#2e1065;--red:#f87171;--red-bg:#2d1212;--shadow:0 2px 12px rgba(0,0,0,.4);--shadow-lg:0 8px 32px rgba(0,0,0,.6)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100dvh;overflow:hidden;-webkit-font-smoothing:antialiased}
#app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto;position:relative;background:var(--bg)}
@media(min-width:768px){body{background:var(--bg2)}#app{margin:24px auto;height:calc(100dvh - 48px);border-radius:28px;overflow:hidden;box-shadow:var(--shadow-lg)}}
.app-header{display:flex;align-items:center;justify-content:space-between;height:var(--header-h);padding:0 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;z-index:10}
.app-logo{font-family:var(--font-display);font-size:20px;font-weight:800;color:var(--accent);letter-spacing:-.5px}
.header-right{display:flex;gap:4px}
.page-container{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;overflow-y:auto;padding:16px 16px calc(16px + var(--nav-h));opacity:0;pointer-events:none;transform:translateY(8px);transition:opacity var(--transition),transform var(--transition);-webkit-overflow-scrolling:touch}
.page.active{opacity:1;pointer-events:all;transform:translateY(0)}
.bottom-nav{position:absolute;bottom:0;left:0;right:0;height:var(--nav-h);display:flex;background:var(--surface);border-top:1px solid var(--border);z-index:10;padding-bottom:env(safe-area-inset-bottom,0)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;cursor:pointer;color:var(--text2);transition:color var(--transition);padding:8px 4px}
.nav-btn.active{color:var(--accent)}
.nav-icon{font-size:22px;line-height:1}
.nav-label{font-family:var(--font-body);font-size:11px;font-weight:500}
.section-title{font-family:var(--font-display);font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text2);margin:20px 0 10px}
.card{background:var(--surface);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:12px}
.card-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.card-row:last-child{border-bottom:none}
.card-row-label{font-size:14px;color:var(--text2)}
.card-row-value{font-family:var(--font-display);font-size:15px;font-weight:700}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:var(--radius-sm);border:none;font-family:var(--font-body);font-size:14px;font-weight:500;cursor:pointer;transition:opacity var(--transition),transform var(--transition);white-space:nowrap}
.btn:active{transform:scale(.97);opacity:.85}
.btn-accent{background:var(--accent);color:#fff}
.btn-outline{background:transparent;color:var(--text);border:1.5px solid var(--border)}
.btn-danger{background:var(--red);color:#fff}
.btn-green{background:var(--green);color:#fff}
.btn-purple{background:var(--purple);color:#fff}
.btn-sm{padding:6px 12px;font-size:13px}
.btn-full{width:100%}
.icon-btn{background:var(--surface2);border:none;border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;transition:background var(--transition);color:var(--text)}
.icon-btn:hover{background:var(--border)}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:13px;font-weight:500;color:var(--text2);margin-bottom:6px}
.form-input,.form-select,.form-textarea{width:100%;padding:10px 14px;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font-body);font-size:15px;color:var(--text);outline:none;transition:border-color var(--transition)}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent)}
.form-textarea{resize:vertical;min-height:80px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.badge{display:inline-block;padding:3px 9px;border-radius:100px;font-size:12px;font-weight:600}
.badge-accent{background:var(--accent-bg);color:var(--accent)}
.badge-green{background:var(--green-bg);color:var(--green)}
.badge-blue{background:var(--blue-bg);color:var(--blue)}
.badge-yellow{background:var(--yellow-bg);color:var(--yellow)}
.badge-purple{background:var(--purple-bg);color:var(--purple)}
.badge-red{background:var(--red-bg);color:var(--red)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.hidden{display:none}
.modal-box{background:var(--surface);border-radius:24px 24px 0 0;width:100%;max-width:480px;max-height:90dvh;overflow-y:auto;padding:20px 20px calc(20px + env(safe-area-inset-bottom,0));box-shadow:var(--shadow-lg);animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.modal-header h3{font-family:var(--font-display);font-size:18px;font-weight:700}
/* MAKRO */
.macro-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.macro-card{background:var(--surface);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow)}
.macro-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.macro-value{font-family:var(--font-display);font-size:22px;font-weight:800;line-height:1}
.macro-eaten{font-size:11px;color:var(--text2);margin-top:2px}
.macro-label{font-size:12px;color:var(--text2);font-weight:500}
.macro-unit{font-size:11px;color:var(--text2)}
.macro-pct{font-family:var(--font-display);font-size:13px;font-weight:700}
.prog-wrap{background:var(--bg2);border-radius:100px;height:7px;overflow:hidden;margin-top:6px}
.prog-fill{height:100%;border-radius:100px;transition:width .5s ease}
.prog-over{background:var(--red)!important}
/* BMR */
.bmr-banner{background:linear-gradient(135deg,var(--accent),var(--yellow));border-radius:var(--radius);padding:16px;color:#fff;margin-bottom:12px}
.bmr-banner-title{font-family:var(--font-display);font-size:13px;font-weight:700;opacity:.85;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.bmr-banner-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.bmr-banner-label{font-size:13px;opacity:.9}
.bmr-banner-value{font-family:var(--font-display);font-size:16px;font-weight:800}
.info-box{background:var(--blue-bg);border-radius:var(--radius-sm);padding:12px;font-size:13px;color:var(--blue);line-height:1.6;margin-bottom:12px}
/* ÖĞÜN */
.ogun-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.ogun-item:last-child{border-bottom:none}
.ogun-item-name{flex:1;font-size:14px;font-weight:500}
.ogun-item-kcal{font-family:var(--font-display);font-size:13px;font-weight:700;color:var(--accent)}
.ogun-item-info{font-size:11px;color:var(--text2)}
/* MİKRO */
.mikro-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.mikro-row:last-child{border-bottom:none}
.mikro-label{font-size:13px;color:var(--text2);width:100px;flex-shrink:0}
.mikro-bar-wrap{flex:1;background:var(--bg2);border-radius:100px;height:6px;overflow:hidden}
.mikro-bar-fill{height:100%;border-radius:100px;transition:width .5s ease}
.mikro-val{font-family:var(--font-display);font-size:12px;font-weight:700;min-width:60px;text-align:right}
/* ANALİZ */
.analiz-banner{border-radius:var(--radius);padding:16px;margin-bottom:12px;color:#fff}
.analiz-big{font-family:var(--font-display);font-size:42px;font-weight:800;line-height:1}
.analiz-label{font-size:13px;opacity:.85;margin-bottom:4px}
.analiz-tip{font-size:15px;font-weight:700;margin-top:6px}
.analiz-aciklama{font-size:12px;opacity:.8;margin-top:4px;line-height:1.5}
.metrik-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.metrik-cell{background:var(--surface);border-radius:var(--radius-sm);padding:12px;box-shadow:var(--shadow);text-align:center}
.metrik-val{font-family:var(--font-display);font-size:20px;font-weight:800}
.metrik-lbl{font-size:11px;color:var(--text2);margin-top:2px}
.metrik-durum{font-size:11px;font-weight:600;margin-top:4px;padding:2px 8px;border-radius:100px;display:inline-block}
.aralik-bar{position:relative;height:10px;border-radius:100px;overflow:hidden;margin:6px 0}
.aralik-segment{position:absolute;top:0;height:100%}
.aralik-pointer{position:absolute;top:-3px;width:3px;height:16px;background:var(--text);border-radius:2px;transform:translateX(-50%)}
/* FOTOĞRAF */
.foto-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.foto-slot{background:var(--bg2);border-radius:var(--radius);overflow:hidden;aspect-ratio:3/4;position:relative;cursor:pointer;border:2px dashed var(--border);transition:border-color var(--transition)}
.foto-slot:hover{border-color:var(--accent)}
.foto-slot img{width:100%;height:100%;object-fit:cover;display:block}
.foto-slot-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:6px;color:var(--text2)}
.foto-slot-empty span{font-size:28px}
.foto-slot-empty p{font-size:12px;font-weight:600;text-align:center;padding:0 8px}
.foto-slot-label{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.55);color:#fff;font-size:12px;font-weight:700;text-align:center;padding:6px;font-family:var(--font-display)}
.foto-slot-del{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.5);border:none;color:#fff;border-radius:50%;width:24px;height:24px;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}
/* EXERCISE */
.exercise-card{background:var(--surface);border-radius:var(--radius);padding:14px;margin-bottom:10px;box-shadow:var(--shadow)}
.exercise-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.exercise-name{font-family:var(--font-display);font-size:16px;font-weight:700}
.set-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(60px,1fr));gap:6px}
.set-pill{background:var(--bg2);border-radius:8px;padding:6px 4px;text-align:center;font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;transition:background var(--transition),color var(--transition);border:1.5px solid transparent}
.set-pill.done{background:var(--accent-bg);color:var(--accent);border-color:var(--accent)}
/* TIMER */
.timer-card{background:var(--accent);border-radius:var(--radius);padding:20px;text-align:center;color:#fff;margin-bottom:12px}
.timer-display{font-family:var(--font-display);font-size:52px;font-weight:800;letter-spacing:-2px;line-height:1;margin-bottom:12px}
.timer-controls{display:flex;gap:10px;justify-content:center}
.timer-btn{background:rgba(255,255,255,.2);border:none;border-radius:10px;padding:10px 20px;color:#fff;font-family:var(--font-body);font-size:14px;font-weight:600;cursor:pointer}
.timer-presets{display:flex;gap:8px;justify-content:center;margin-top:10px;flex-wrap:wrap}
.timer-preset-btn{background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.3);border-radius:100px;padding:5px 14px;color:#fff;font-size:13px;font-weight:600;cursor:pointer}
/* RECIPE */
.recipe-card{background:var(--surface);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow);cursor:pointer;transition:transform var(--transition)}
.recipe-card:active{transform:scale(.98)}
.recipe-card-title{font-family:var(--font-display);font-size:17px;font-weight:700;margin-bottom:6px}
.recipe-meta{display:flex;gap:8px;flex-wrap:wrap}
/* SHOPPING */
.shop-item{display:flex;align-items:center;gap:12px;background:var(--surface);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:8px;box-shadow:var(--shadow);transition:opacity var(--transition)}
.shop-item.checked{opacity:.5}
.shop-item.checked .shop-item-name{text-decoration:line-through}
.shop-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--transition)}
.shop-check.checked{background:var(--green);border-color:var(--green);color:#fff;font-size:12px}
.shop-item-name{flex:1;font-size:15px}
.shop-item-qty{font-size:13px;color:var(--text2)}
/* MEASURE */
.measure-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.measure-cell{background:var(--bg2);border-radius:var(--radius-sm);padding:10px 8px;text-align:center}
.measure-cell-val{font-family:var(--font-display);font-size:18px;font-weight:800}
.measure-cell-lbl{font-size:11px;color:var(--text2);margin-top:2px}
/* HISTORY */
.history-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:14px}
.history-item:last-child{border-bottom:none}
.history-date{color:var(--text2);font-size:12px}
/* EMPTY */
.empty-state{text-align:center;padding:48px 24px;color:var(--text2)}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-title{font-family:var(--font-display);font-size:18px;font-weight:700;color:var(--text);margin-bottom:8px}
.empty-desc{font-size:14px;line-height:1.6}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.flex{display:flex}.flex-between{display:flex;justify-content:space-between;align-items:center}
.gap-8{gap:8px}.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-16{margin-top:16px}
.text-accent{color:var(--accent)}.text-muted{color:var(--text2);font-size:13px}
.fw-700{font-weight:700}.font-display{font-family:var(--font-display)}
</style>
</head>
<body>
<div id="app">
  <header class="app-header">
    <div class="header-left"><span class="app-logo">⚡ FitApp</span></div>
    <div class="header-right">
      <button id="themeToggle" class="icon-btn">🔄</button>
      <button id="exportBtn" class="icon-btn" title="Yedek Al">⬆️</button>
      <button id="importBtn" class="icon-btn" title="Yedek Yükle">⬇️</button>
      <input type="file" id="importFile" accept=".json" style="display:none"/>
    </div>
  </header>
  <main class="page-container">
    <div id="page-genel" class="page active"></div>
    <div id="page-spor" class="page"></div>
    <div id="page-tarifler" class="page"></div>
    <div id="page-alisveris" class="page"></div>
  </main>
  <nav class="bottom-nav">
    <button class="nav-btn active" data-page="genel"><span class="nav-icon">🏠</span><span class="nav-label">Genel</span></button>
    <button class="nav-btn" data-page="spor"><span class="nav-icon">💪</span><span class="nav-label">Spor</span></button>
    <button class="nav-btn" data-page="tarifler"><span class="nav-icon">🍽️</span><span class="nav-label">Tarifler</span></button>
    <button class="nav-btn" data-page="alisveris"><span class="nav-icon">🛒</span><span class="nav-label">Alışveriş</span></button>
  </nav>
</div>
<div id="modalOverlay" class="modal-overlay hidden">
  <div id="modalBox" class="modal-box">
    <div class="modal-header"><h3 id="modalTitle"></h3><button id="modalClose" class="icon-btn">✕</button></div>
    <div id="modalBody"></div>
  </div>
</div>
<!-- fotoğraf input gizli -->
<input type="file" id="fotoInput" accept="image/*" style="display:none"/>

<script>
// ===== STORE =====
const Store = (() => {
  const KEY='fitapp_data';
  const def={
    macros:{kalori:2200,protein:160,karbonhidrat:250,yag:65,lif:30,vitamin_c:90,demir:18,kalsiyum:1000,magnezyum:400},
    profil:{ad:'',kilo:'',boy:'',yas:'',cinsiyet:'Erkek',aktivite:'1.55',hedef:'koruma',proteinOrani:'2.0',yagOrani:'0.9',manuelMod:false},
    olcumler:{gogus:'',bel:'',kalca:'',biceps_sag:'',biceps_sol:'',uyluk_sag:'',uyluk_sol:'',omuz:'',boyun:'',bacak:''},
    olcumGecmisi:[],egzersizler:[],tarifler:[],alisveris:[],
    ogunGecmisi:{},
    foto:{ilk:null,son:null},
    settings:{theme:'auto',customBreak:90}
  };
  function load(){try{const r=localStorage.getItem(KEY);if(!r)return JSON.parse(JSON.stringify(def));return deepMerge(JSON.parse(JSON.stringify(def)),JSON.parse(r));}catch{return JSON.parse(JSON.stringify(def))}}
  function deepMerge(t,s){for(const k in s){if(s[k]&&typeof s[k]==='object'&&!Array.isArray(s[k])){if(!t[k])t[k]={};deepMerge(t[k],s[k]);}else t[k]=s[k];}return t;}
  function save(d){localStorage.setItem(KEY,JSON.stringify(d))}
  function exportJSON(d){const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=`fitapp_yedek_${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(u)}
  function importJSON(file,cb){const r=new FileReader();r.onload=e=>{try{cb(null,JSON.parse(e.target.result))}catch{cb(new Error('Geçersiz JSON'))}};r.readAsText(file)}
  function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
  function today(){return new Date().toISOString().slice(0,10)}
  function prettyDate(v){
    if(!v)return '';
    if(/^\d{4}-\d{2}-\d{2}$/.test(v)){
      const [y,m,d]=v.split('-').map(Number);
      return new Date(y,m-1,d).toLocaleDateString('tr-TR',{day:'numeric',month:'long',year:'numeric'});
    }
    const parts=String(v).replace(/\//g,'.').split('.');
    if(parts.length===3){
      const [d,m,y]=parts.map(Number);
      if(d&&m&&y) return new Date(y,m-1,d).toLocaleDateString('tr-TR',{day:'numeric',month:'long',year:'numeric'});
    }
    return String(v);
  }
  return{load,save,exportJSON,importJSON,uid,today,prettyDate};
})();

// ===== CALC =====
const Calc = (() => {
  function bmr(kilo,boy,yas,cins){if(!kilo||!boy||!yas)return null;const k=+kilo,b=+boy,y=+yas;return cins==='Erkek'?Math.round(10*k+6.25*b-5*y+5):Math.round(10*k+6.25*b-5*y-161);}
  function tdee(b,a){return Math.round(b*(+a))}
  function hedefKcal(t,h){if(h==='vermek500')return t-500;if(h==='vermek300')return t-300;if(h==='almak300')return t+300;if(h==='almak500')return t+500;return t;}
  function makrolar(kcal,kilo,po,yo){const p=Math.round((+kilo)*(+po)),y=Math.round((+kilo)*(+yo)),k=Math.max(0,Math.round((kcal-(p*4)-(y*9))/4));return{protein:p,yag:y,karbonhidrat:k};}
  function mikro(cins){const e=cins==='Erkek';return{lif:e?38:25,vitamin_c:e?90:75,demir:e?8:18,kalsiyum:1000,magnezyum:e?420:320};}
  function hesapla(p){const b=bmr(p.kilo,p.boy,p.yas,p.cinsiyet);if(!b)return null;const t=tdee(b,p.aktivite||'1.55'),k=hedefKcal(t,p.hedef||'koruma'),m=makrolar(k,p.kilo,p.proteinOrani||'2.0',p.yagOrani||'0.9'),mi=mikro(p.cinsiyet);return{bmr:b,tdee:t,kalori:k,...m,...mi};}
  function ogunToplam(ogunler){const t={kalori:0,protein:0,karbonhidrat:0,yag:0,lif:0,vitamin_c:0,demir:0,kalsiyum:0,magnezyum:0};(ogunler||[]).forEach(o=>{['kalori','protein','karbonhidrat','yag','lif','vitamin_c','demir','kalsiyum','magnezyum'].forEach(k=>{t[k]+=+(o[k]||0);});});return t;}
  const aLabels={'1.2':'Masa Başı','1.375':'Hafif Aktif','1.55':'Orta Aktif','1.725':'Çok Aktif','1.9':'Ekstra Aktif'};
  const hLabels={'vermek500':'Kilo Ver (-500)','vermek300':'Kilo Ver (-300)','koruma':'Koru (TDEE)','almak300':'Kilo Al (+300)','almak500':'Kilo Al (+500)'};

  // Yağ oranı & vücut analizi
  function vagOrani(p,olcumler){
    const {kilo,boy,cinsiyet}=p;
    const {bel,boyun,kalca,gogus,bacak,omuz}=olcumler;
    if(!kilo||!boy||!bel||!boyun)return null;
    const h=+boy,w=+kilo,waist=+bel,neck=+boyun;
    const hip=+(kalca||0),chest=+(gogus||0),thigh=+(bacak||0),shoulder=+(omuz||0);
    const C=cinsiyet==='Erkek'?1:0;
    if(C===0&&!hip)return null;
    const log10=x=>Math.log(x)/Math.log(10);
    // BMI
    const bmi=w/Math.pow(h/100,2);
    // NAVY
    let N;
    if(C===1){N=86.010*log10(waist-neck)-70.041*log10(h)+36.76;}
    else{N=163.205*log10(waist+hip-neck)-97.684*log10(h)-78.387;}
    // Oranlar
    const R1=waist/h,R2=neck/h,R3=shoulder/h,R4=hip/h,R5=chest/h,R6=thigh/h;
    const D=(25*R1)-(15*R2)-(10*R3)+(8*(1-C)*R4)-(6*R5)+(4*R6);
    const bmiFat=(1.20*bmi)-(10.8*C)-5.4;
    let fat=(0.6*N)+(0.25*bmiFat)+(0.15*D);
    if(fat<3)fat=3;if(fat>60)fat=60;
    // Bel/boy oranı
    const belBoy=waist/h;
    // Vücut tipi
    let tip,tipAciklama,tipRenk;
    if(C===1){
      if(bmi<20&&fat<12){tip='Ektomorf';tipAciklama='İnce iskelet yapısı, düşük yağ ve kas kütlesi. Kilo almakta zorlanırsın.';tipRenk='var(--blue)';}
      else if(bmi>=19&&bmi<=25&&fat>=10&&fat<=20){tip='Mezomorf';tipAciklama='Atletik yapı, kas kazanımı kolay. Dengeli yağ-kas oranı.';tipRenk='var(--green)';}
      else{tip='Endomorf';tipAciklama='Yuvarlak yapı, yağ depolama eğilimi yüksek. Metabolizma daha yavaş.';tipRenk='var(--yellow)';}
    } else {
      if(bmi<19&&fat<18){tip='Ektomorf';tipAciklama='İnce iskelet yapısı, düşük yağ ve kas kütlesi.';tipRenk='var(--blue)';}
      else if(bmi>=19&&bmi<=24&&fat>=18&&fat<=28){tip='Mezomorf';tipAciklama='Atletik yapı, dengeli oran.';tipRenk='var(--green)';}
      else{tip='Endomorf';tipAciklama='Yağ depolama eğilimi yüksek.';tipRenk='var(--yellow)';}
    }
    // Sağlıklı yağ aralıkları
    const saglikliAralik=C===1?{alt:8,iyi_alt:10,iyi_ust:20,ust:25}:{alt:14,iyi_alt:18,iyi_ust:28,ust:35};
    let saglikDurum,saglikRenk;
    if(fat<=saglikliAralik.alt){saglikDurum='Çok Düşük';saglikRenk='var(--blue)';}
    else if(fat<=saglikliAralik.iyi_ust){saglikDurum='Sağlıklı Aralık ✓';saglikRenk='var(--green)';}
    else if(fat<=saglikliAralik.ust){saglikDurum='Yüksek';saglikRenk='var(--yellow)';}
    else{saglikDurum='Çok Yüksek';saglikRenk='var(--red)';}
    // BMI kategorisi
    let bmiKat,bmiRenk;
    if(bmi<18.5){bmiKat='Zayıf';bmiRenk='var(--blue)';}
    else if(bmi<25){bmiKat='Normal ✓';bmiRenk='var(--green)';}
    else if(bmi<30){bmiKat='Fazla Kilolu';bmiRenk='var(--yellow)';}
    else{bmiKat='Obez';bmiRenk='var(--red)';}
    // Bel/boy değerlendirmesi
    let bbKat,bbRenk;
    if(belBoy<0.4){bbKat='Çok İnce';bbRenk='var(--blue)';}
    else if(belBoy<0.5){bbKat='Sağlıklı ✓';bbRenk='var(--green)';}
    else if(belBoy<0.6){bbKat='Risk Altında';bbRenk='var(--yellow)';}
    else{bbKat='Yüksek Risk';bbRenk='var(--red)';}
    return{fat:+fat.toFixed(1),bmi:+bmi.toFixed(1),belBoy:+belBoy.toFixed(3),tip,tipAciklama,tipRenk,saglikDurum,saglikRenk,bmiKat,bmiRenk,bbKat,bbRenk,saglikliAralik,C};
  }
  return{hesapla,aLabels,hLabels,ogunToplam,vagOrani};
})();

// ===== THEME =====
const Theme=(()=>{
  let cur='auto';
  function apply(t){cur=t;document.documentElement.setAttribute('data-theme',t==='auto'?(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light'):t);const b=document.getElementById('themeToggle');if(b)b.textContent=t==='dark'?'☀️':t==='light'?'🌙':'🔄';}
  function toggle(){const o=['auto','light','dark'];const n=o[(o.indexOf(cur)+1)%o.length];apply(n);return n;}
  function init(s){apply(s||'auto');window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change',()=>{if(cur==='auto')apply('auto');});}
  return{init,toggle};
})();

// ===== MODAL =====
const Modal=(()=>{
  let cb=null;
  function open(title,html,onClose){document.getElementById('modalTitle').textContent=title;document.getElementById('modalBody').innerHTML=html;document.getElementById('modalOverlay').classList.remove('hidden');cb=onClose||null;}
  function close(){document.getElementById('modalOverlay').classList.add('hidden');if(cb){cb();cb=null;}}
  function getBody(){return document.getElementById('modalBody')}
  document.addEventListener('DOMContentLoaded',()=>{
    document.getElementById('modalClose').addEventListener('click',close);
    document.getElementById('modalOverlay').addEventListener('click',e=>{if(e.target===document.getElementById('modalOverlay'))close();});
  });
  return{open,close,getBody};
})();

  function applyCalc(data,c){['kalori','protein','karbonhidrat','yag','lif','vitamin_c','demir','kalsiyum','magnezyum'].forEach(k=>{data.macros[k]=c[k];});}

      data.olcumler.uyluk_sol=document.getElementById('o_usol').value;

  function openOgunModal(data){
    const tarifler=data.tarifler||[];
    if(tarifler.length===0){alert('Önce Tarifler bölümüne yemek ekle!');return;}
    const bugun=Store.today();
    Modal.open('Öğün Ekle',`
      <div class="info-box">Tariften seç — makro/mikro değerleri otomatik eklenir.</div>
      <div id="tarifSecList">
        ${tarifler.map(t=>`<div class="ogun-item tarif-sec-item" data-id="${t.id}" style="cursor:pointer;border-radius:10px;padding:12px;background:var(--bg2);margin-bottom:8px;border:2px solid transparent"><div style="flex:1"><div class="fw-700">${t.ad}</div><div class="text-muted" style="font-size:12px">${t.kalori?`🔥 ${t.kalori} kcal`:''}${t.protein?` · P:${t.protein}g`:''}${t.karbonhidrat?` · K:${t.karbonhidrat}g`:''}${t.yag?` · Y:${t.yag}g`:''}</div></div><div style="font-size:20px">➕</div></div>`).join('')}
      </div>`);
    Modal.getBody().querySelectorAll('.tarif-sec-item').forEach(item=>{
      item.addEventListener('click',()=>{
        const tarif=tarifler.find(t=>t.id===item.dataset.id);if(!tarif)return;
        if(!data.ogunGecmisi)data.ogunGecmisi={};if(!data.ogunGecmisi[bugun])data.ogunGecmisi[bugun]=[];
        data.ogunGecmisi[bugun].push({ad:tarif.ad,kalori:+(tarif.kalori||0),protein:+(tarif.protein||0),karbonhidrat:+(tarif.karbonhidrat||0),yag:+(tarif.yag||0),lif:+(tarif.lif||0),vitamin_c:+(tarif.vitamin_c||0),demir:+(tarif.demir||0),kalsiyum:+(tarif.kalsiyum||0),magnezyum:+(tarif.magnezyum||0)});
        Store.save(data);render(data);Modal.close();
      });
    });
  }

  function openOgunGecmisi(data){
    const gecmis=data.ogunGecmisi||{};
    const parseDate=v=>{
      if(/^\d{4}-\d{2}-\d{2}$/.test(v)){const [y,m,d]=v.split('-').map(Number);return new Date(y,m-1,d).getTime();}
      const p=String(v).replace(/\//g,'.').split('.');if(p.length===3){const [d,m,y]=p.map(Number);return new Date(y,m-1,d).getTime();}
      return 0;
    };
    const tarihler=Object.keys(gecmis).sort((a,b)=>parseDate(b)-parseDate(a));
    if(tarihler.length===0){Modal.open('Öğün Geçmişi','<div class="empty-state"><div class="empty-icon">📅</div><div class="empty-title">Geçmiş yok</div></div>');return;}
    Modal.open('📅 Öğün Geçmişi',tarihler.map(tarih=>{
      const ogunler=gecmis[tarih]||[],toplam=Calc.ogunToplam(ogunler);
      return`<div style="margin-bottom:16px"><div class="section-title">${tarih}</div><div class="card" style="margin-bottom:0">${ogunler.map(og=>`<div class="ogun-item"><div style="flex:1"><div class="ogun-item-name">${og.ad}</div><div class="ogun-item-info">P:${og.protein||0}g · K:${og.karbonhidrat||0}g · Y:${og.yag||0}g</div></div><div class="ogun-item-kcal">${og.kalori||0} kcal</div></div>`).join('')}<div style="padding-top:10px;border-top:1px solid var(--border);display:flex;gap:12px;font-size:13px"><span class="fw-700 text-accent">Toplam: ${toplam.kalori} kcal</span><span style="color:var(--blue)">P:${toplam.protein}g</span><span style="color:var(--yellow)">K:${toplam.karbonhidrat}g</span><span style="color:var(--green)">Y:${toplam.yag}g</span></div></div></div>`;
    }).join(''));
  }

  function openProfil(data){
    const p=data.profil;
    Modal.open('Profil Düzenle',`
      <div class="form-group"><label class="form-label">Ad Soyad</label><input class="form-input" id="f_ad" value="${p.ad||''}" placeholder="Adın..."></div>
      <div class="form-row"><div class="form-group"><label class="form-label">Kilo (kg)</label><input class="form-input" id="f_kilo" type="number" value="${p.kilo||''}"></div><div class="form-group"><label class="form-label">Boy (cm)</label><input class="form-input" id="f_boy" type="number" value="${p.boy||''}"></div></div>
      <div class="form-row"><div class="form-group"><label class="form-label">Yaş</label><input class="form-input" id="f_yas" type="number" value="${p.yas||''}"></div><div class="form-group"><label class="form-label">Cinsiyet</label><select class="form-select" id="f_cins"><option ${p.cinsiyet==='Erkek'?'selected':''}>Erkek</option><option ${p.cinsiyet==='Kadın'?'selected':''}>Kadın</option></select></div></div>
      <button class="btn btn-accent btn-full" id="saveProfil">Kaydet</button>`);
    Modal.getBody().querySelector('#saveProfil').addEventListener('click',()=>{
      data.profil.ad=document.getElementById('f_ad').value;data.profil.kilo=document.getElementById('f_kilo').value;data.profil.boy=document.getElementById('f_boy').value;data.profil.yas=document.getElementById('f_yas').value;data.profil.cinsiyet=document.getElementById('f_cins').value;
      if(!data.profil.manuelMod){const c=Calc.hesapla(data.profil);if(c)applyCalc(data,c);}
      Store.save(data);render(data);Modal.close();
    });
  }

  function openHesapAyarlari(data){
    const p=data.profil;
    Modal.open('⚙️ Hesap Ayarları',`
      <div class="form-group"><label class="form-label">Aktivite Seviyesi</label><select class="form-select" id="h_akt">${Object.entries(Calc.aLabels).map(([v,l])=>`<option value="${v}" ${p.aktivite===v?'selected':''}>${l}</option>`).join('')}</select></div>
      <div class="form-group"><label class="form-label">Hedef</label><select class="form-select" id="h_hdf">${Object.entries(Calc.hLabels).map(([v,l])=>`<option value="${v}" ${p.hedef===v?'selected':''}>${l}</option>`).join('')}</select></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Protein (g/kg)</label><select class="form-select" id="h_pro"><option value="1.6" ${p.proteinOrani==='1.6'?'selected':''}>1.6</option><option value="2.0" ${p.proteinOrani==='2.0'?'selected':''}>2.0</option><option value="2.2" ${p.proteinOrani==='2.2'?'selected':''}>2.2</option></select></div>
        <div class="form-group"><label class="form-label">Yağ (g/kg)</label><select class="form-select" id="h_yag"><option value="0.8" ${p.yagOrani==='0.8'?'selected':''}>0.8</option><option value="0.9" ${p.yagOrani==='0.9'?'selected':''}>0.9</option><option value="1.0" ${p.yagOrani==='1.0'?'selected':''}>1.0</option></select></div>
      </div>
      <div id="onizleme"></div>
      <button class="btn btn-accent btn-full" id="saveHesap">Hesapla & Uygula</button>`);
    function guncelle(){const tmp={...data.profil,aktivite:document.getElementById('h_akt').value,hedef:document.getElementById('h_hdf').value,proteinOrani:document.getElementById('h_pro').value,yagOrani:document.getElementById('h_yag').value};const c=Calc.hesapla(tmp);if(c)document.getElementById('onizleme').innerHTML=`<div class="bmr-banner" style="margin-bottom:12px"><div class="bmr-banner-title">Önizleme</div><div class="bmr-banner-row"><span class="bmr-banner-label">Hedef Kalori</span><span class="bmr-banner-value">${c.kalori} kcal</span></div><div class="bmr-banner-row"><span class="bmr-banner-label">Protein / Karb / Yağ</span><span class="bmr-banner-value">${c.protein}g / ${c.karbonhidrat}g / ${c.yag}g</span></div></div>`;}
    ['h_akt','h_hdf','h_pro','h_yag'].forEach(id=>document.getElementById(id)?.addEventListener('change',guncelle));guncelle();
    Modal.getBody().querySelector('#saveHesap').addEventListener('click',()=>{data.profil.aktivite=document.getElementById('h_akt').value;data.profil.hedef=document.getElementById('h_hdf').value;data.profil.proteinOrani=document.getElementById('h_pro').value;data.profil.yagOrani=document.getElementById('h_yag').value;const c=Calc.hesapla(data.profil);if(c)applyCalc(data,c);Store.save(data);render(data);Modal.close();});
  }

  function openMacroManuel(data){
    const m=data.macros;
    Modal.open('Makro / Mikro Hedefler',`
      <div class="form-row"><div class="form-group"><label class="form-label">Kalori</label><input class="form-input" id="m_kal" type="number" value="${m.kalori}"></div><div class="form-group"><label class="form-label">Protein (g)</label><input class="form-input" id="m_pro" type="number" value="${m.protein}"></div></div>
      <div class="form-row"><div class="form-group"><label class="form-label">Karbonhidrat (g)</label><input class="form-input" id="m_kar" type="number" value="${m.karbonhidrat}"></div><div class="form-group"><label class="form-label">Yağ (g)</label><input class="form-input" id="m_yag" type="number" value="${m.yag}"></div></div>
      <div class="section-title">Mikro</div>
      <div class="form-row"><div class="form-group"><label class="form-label">Lif (g)</label><input class="form-input" id="m_lif" type="number" value="${m.lif}"></div><div class="form-group"><label class="form-label">Vitamin C (mg)</label><input class="form-input" id="m_vitc" type="number" value="${m.vitamin_c}"></div></div>
      <div class="form-row"><div class="form-group"><label class="form-label">Demir (mg)</label><input class="form-input" id="m_dem" type="number" value="${m.demir}"></div><div class="form-group"><label class="form-label">Kalsiyum (mg)</label><input class="form-input" id="m_kal2" type="number" value="${m.kalsiyum}"></div></div>
      <div class="form-group"><label class="form-label">Magnezyum (mg)</label><input class="form-input" id="m_mag" type="number" value="${m.magnezyum}"></div>
      <button class="btn btn-accent btn-full" id="saveMacro">Kaydet</button>`);
    Modal.getBody().querySelector('#saveMacro').addEventListener('click',()=>{['kalori','protein','karbonhidrat','yag','lif','vitamin_c','demir','kalsiyum','magnezyum'].forEach((k,i)=>{const ids=['m_kal','m_pro','m_kar','m_yag','m_lif','m_vitc','m_dem','m_kal2','m_mag'];data.macros[k]=+document.getElementById(ids[i]).value;});Store.save(data);render(data);Modal.close();});
  }

  return{render};
})();

// ===== PAGE: SPOR =====
const PageSpor=(()=>{
  let timerInterval=null,timerSeconds=0,timerRunning=false;
  function render(data){
    const el=document.getElementById('page-spor');
    const egz=data.egzersizler||[];
    el.innerHTML=`
      <div class="timer-card">
        <div class="timer-display" id="timerDisplay">01:30</div>
        <div class="timer-controls"><button class="timer-btn" id="timerSS">▶ Başlat</button><button class="timer-btn" id="timerReset">↺ Sıfırla</button></div>
        <div class="timer-presets"><button class="timer-preset-btn" data-sec="30">30s</button><button class="timer-preset-btn" data-sec="60">1dk</button><button class="timer-preset-btn" data-sec="90">1:30</button><button class="timer-preset-btn" data-sec="120">2dk</button><button class="timer-preset-btn" data-sec="180">3dk</button><button class="timer-preset-btn" id="timerCustom">✎ Özel</button></div>
      </div>
      <div class="flex-between"><div class="section-title" style="margin-top:0">Antrenman Programı</div><button class="btn btn-accent btn-sm" id="addEgzBtn">+ Hareket</button></div>
      ${egz.length===0?`<div class="empty-state"><div class="empty-icon">🏋️</div><div class="empty-title">Henüz hareket eklenmedi</div><div class="empty-desc">+ Hareket butonuyla antrenman programını oluştur.</div></div>`:egz.map(e=>renderEgz(e)).join('')}`;
    if(!timerRunning && timerSeconds<=0) timerSeconds=data.settings?.customBreak||90;
    el.querySelector('#timerDisplay').textContent=fmt(timerSeconds);
    el.querySelector('#timerSS').addEventListener('click',()=>toggleTimer(el));
    el.querySelector('#timerReset').addEventListener('click',()=>{stopTimer();timerSeconds=data.settings?.customBreak||90;el.querySelector('#timerDisplay').textContent=fmt(timerSeconds);el.querySelector('#timerSS').textContent='▶ Başlat';});
    el.querySelectorAll('.timer-preset-btn[data-sec]').forEach(btn=>{btn.addEventListener('click',()=>{stopTimer();timerSeconds=+btn.dataset.sec;el.querySelector('#timerDisplay').textContent=fmt(timerSeconds);el.querySelector('#timerSS').textContent='▶ Başlat';});});
    el.querySelector('#timerCustom').addEventListener('click',()=>{const v=prompt('Kaç saniye?');if(v&&!isNaN(v)){stopTimer();timerSeconds=+v;el.querySelector('#timerDisplay').textContent=fmt(timerSeconds);el.querySelector('#timerSS').textContent='▶ Başlat';data.settings.customBreak=+v;Store.save(data);}});
    el.querySelectorAll('.set-pill').forEach(p=>p.addEventListener('click',()=>p.classList.toggle('done')));
    el.querySelector('#addEgzBtn').addEventListener('click',()=>openEgzModal(data));
    el.querySelectorAll('.edit-egz-btn').forEach(btn=>{btn.addEventListener('click',()=>{const e=data.egzersizler.find(x=>x.id===btn.dataset.id);if(e)openEgzModal(data,e);});});
    el.querySelectorAll('.del-egz-btn').forEach(btn=>{btn.addEventListener('click',()=>{if(confirm('Bu hareketi silmek istiyor musun?')){data.egzersizler=data.egzersizler.filter(x=>x.id!==btn.dataset.id);Store.save(data);render(data);}});});
  }
  function renderEgz(e){
    const tr={'Ağırlık':'badge-accent','Kardiyo':'badge-green','Calisthenics':'badge-blue','Esneme':'badge-yellow'};
    return`<div class="exercise-card"><div class="exercise-header"><div><div class="exercise-name">${e.ad}</div><div style="margin-top:4px"><span class="badge ${tr[e.tip]||'badge-accent'}">${e.tip}</span></div></div><div class="flex gap-8"><button class="icon-btn edit-egz-btn" data-id="${e.id}">✏️</button><button class="icon-btn del-egz-btn" data-id="${e.id}">🗑️</button></div></div>${e.setler.length>0?`<div class="set-grid">${e.setler.map((s,i)=>`<div class="set-pill">${s.agirlik?s.agirlik+'kg<br>':''}${s.tekrar}x</div>`).join('')}</div>`:''}${e.notlar?`<div class="text-muted mt-8">📝 ${e.notlar}</div>`:''}</div>`;
  }
  function openEgzModal(data,existing){
    const isEdit=!!existing;
    const e=existing||{id:Store.uid(),ad:'',tip:'Ağırlık',setler:[],notlar:''};
    let setler=[...e.setler];
    function renderSets(){const c=document.getElementById('setlerCont');if(!c)return;c.innerHTML=setler.map((s,i)=>`<div style="display:grid;grid-template-columns:1fr 1fr 32px;gap:8px;align-items:center;margin-bottom:8px"><input class="form-input" id="st_${i}" type="number" value="${s.tekrar}" placeholder="Tekrar"><input class="form-input" id="sa_${i}" type="number" value="${s.agirlik||''}" placeholder="Kg"><button class="icon-btn dset" data-i="${i}" style="font-size:14px">✕</button></div>`).join('')+`<button class="btn btn-outline btn-sm" id="addSet">+ Set Ekle</button>`;c.querySelectorAll('.dset').forEach(b=>b.addEventListener('click',()=>{setler.splice(+b.dataset.i,1);renderSets();}));c.querySelector('#addSet')?.addEventListener('click',()=>{setler.push({tekrar:10,agirlik:''});renderSets();});}
    Modal.open(isEdit?'Hareketi Düzenle':'Yeni Hareket',`
      <div class="form-group"><label class="form-label">Hareket Adı</label><input class="form-input" id="e_ad" value="${e.ad}" placeholder="Bench Press, Squat..."></div>
      <div class="form-group"><label class="form-label">Tip</label><select class="form-select" id="e_tip"><option ${e.tip==='Ağırlık'?'selected':''}>Ağırlık</option><option ${e.tip==='Kardiyo'?'selected':''}>Kardiyo</option><option ${e.tip==='Calisthenics'?'selected':''}>Calisthenics</option><option ${e.tip==='Esneme'?'selected':''}>Esneme</option></select></div>
      <div class="section-title">Setler</div><div id="setlerCont"></div>
      <div class="form-group" style="margin-top:12px"><label class="form-label">Notlar</label><textarea class="form-textarea" id="e_not" placeholder="Form notları...">${e.notlar||''}</textarea></div>
      <button class="btn btn-accent btn-full" id="saveEgz">${isEdit?'Güncelle':'Ekle'}</button>
      ${isEdit?'<button class="btn btn-danger btn-full mt-12" id="delEgz">Hareketi Sil</button>':''}`);
    renderSets();
    Modal.getBody().querySelector('#saveEgz').addEventListener('click',()=>{e.ad=document.getElementById('e_ad').value;e.tip=document.getElementById('e_tip').value;e.setler=setler.map((_,i)=>({tekrar:+document.getElementById(`st_${i}`)?.value||0,agirlik:document.getElementById(`sa_${i}`)?.value||''}));e.notlar=document.getElementById('e_not').value;if(isEdit){const idx=data.egzersizler.findIndex(x=>x.id===e.id);if(idx!==-1)data.egzersizler[idx]=e;}else data.egzersizler.push(e);Store.save(data);render(data);Modal.close();});
    if(isEdit)Modal.getBody().querySelector('#delEgz')?.addEventListener('click',()=>{data.egzersizler=data.egzersizler.filter(x=>x.id!==e.id);Store.save(data);render(data);Modal.close();});
  }
  function fmt(s){return`${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`}
  function toggleTimer(el){if(timerRunning){stopTimer();el.querySelector('#timerSS').textContent='▶ Devam';}else{timerRunning=true;el.querySelector('#timerSS').textContent='⏸ Duraklat';timerInterval=setInterval(()=>{if(timerSeconds>0){timerSeconds--;const d=document.getElementById('timerDisplay');if(d)d.textContent=fmt(timerSeconds);if(timerSeconds===0){stopTimer();if(navigator.vibrate)navigator.vibrate([200,100,200]);const b=document.getElementById('timerSS');if(b)b.textContent='▶ Başlat';}}},1000);}}
  function stopTimer(){clearInterval(timerInterval);timerRunning=false;}
  return{render};
})();

    el.innerHTML=`

      <div id="tarifList" style="margin-top:12px">${renderList(data.tarifler,'Tümü')}</div>`;
    el.querySelector('#addTarif').addEventListener('click',()=>openTarifModal(data));
    el.querySelectorAll('.catbtn').forEach(btn=>{btn.addEventListener('click',()=>{el.querySelectorAll('.catbtn').forEach(b=>{b.classList.remove('btn-accent');b.classList.add('btn-outline');});btn.classList.add('btn-accent');btn.classList.remove('btn-outline');el.querySelector('#tarifList').innerHTML=renderList(data.tarifler,btn.dataset.cat);attachEvents(el,data);});});
    attachEvents(el,data);
  }
  function renderList(tarifler,cat){
    const f=cat==='Tümü'?tarifler:tarifler.filter(t=>t.kategori===cat);
    if(!f.length)return`<div class="empty-state"><div class="empty-icon">📖</div><div class="empty-title">Tarif bulunamadı</div><div class="empty-desc">+ Tarif butonuyla ekleyebilirsin.</div></div>`;
    return f.map(t=>`<div class="recipe-card" data-id="${t.id}"><div class="recipe-card-title">${t.ad}</div><div class="recipe-meta">${t.sure?`<span class="badge badge-blue">⏱ ${t.sure} dk</span>`:''}${t.kalori?`<span class="badge badge-accent">🔥 ${t.kalori} kcal</span>`:''}${t.protein?`<span class="badge badge-blue">P:${t.protein}g</span>`:''}${t.kategori?`<span class="badge badge-green">${t.kategori}</span>`:''}</div>${t.malzemeler?`<div class="text-muted mt-8" style="font-size:13px">${t.malzemeler.slice(0,60)}${t.malzemeler.length>60?'…':''}</div>`:''}</div>`).join('');
  }
  function attachEvents(el,data){el.querySelectorAll('.recipe-card').forEach(card=>{card.addEventListener('click',()=>{const t=data.tarifler.find(x=>x.id===card.dataset.id);if(t)openTarifDetay(t,data);});});}
  function openTarifDetay(t,data){
    Modal.open(t.ad,`
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">${t.sure?`<span class="badge badge-blue">⏱ ${t.sure} dk</span>`:''}${t.kalori?`<span class="badge badge-accent">🔥 ${t.kalori} kcal</span>`:''}${t.kategori?`<span class="badge badge-green">${t.kategori}</span>`:''}</div>
      ${(t.kalori||t.protein||t.karbonhidrat||t.yag)?`<div class="section-title">Makro Değerler</div><div class="card" style="margin-bottom:12px"><div class="form-row-3">${t.kalori?`<div style="text-align:center"><div style="font-family:var(--font-display);font-size:20px;font-weight:800;color:var(--accent)">${t.kalori}</div><div class="text-muted">kcal</div></div>`:''}${t.protein?`<div style="text-align:center"><div style="font-family:var(--font-display);font-size:20px;font-weight:800;color:var(--blue)">${t.protein}g</div><div class="text-muted">Protein</div></div>`:''}${t.karbonhidrat?`<div style="text-align:center"><div style="font-family:var(--font-display);font-size:20px;font-weight:800;color:var(--yellow)">${t.karbonhidrat}g</div><div class="text-muted">Karb</div></div>`:''}</div>${t.yag||t.lif?`<div class="form-row" style="margin-top:10px">${t.yag?`<div style="text-align:center"><div style="font-family:var(--font-display);font-size:18px;font-weight:800;color:var(--green)">${t.yag}g</div><div class="text-muted">Yağ</div></div>`:''}${t.lif?`<div style="text-align:center"><div style="font-family:var(--font-display);font-size:18px;font-weight:800;color:var(--purple)">${t.lif}g</div><div class="text-muted">Lif</div></div>`:''}</div>`:''}</div>`:''}
      ${t.malzemeler?`<div class="section-title">Malzemeler</div><div class="card" style="white-space:pre-wrap;font-size:14px;line-height:1.7">${t.malzemeler}</div>`:''}
      ${t.hazirlanis?`<div class="section-title">Hazırlanışı</div><div class="card" style="white-space:pre-wrap;font-size:14px;line-height:1.7">${t.hazirlanis}</div>`:''}
      ${t.notlar?`<div class="section-title">Notlar</div><div class="text-muted" style="font-size:14px;line-height:1.6">${t.notlar}</div>`:''}
      <div style="display:flex;gap:8px;margin-top:16px"><button class="btn btn-outline" style="flex:1" id="editTarif">✏️ Düzenle</button><button class="btn btn-danger" style="flex:1" id="delTarif">🗑️ Sil</button></div>`);
    Modal.getBody().querySelector('#editTarif').addEventListener('click',()=>{Modal.close();setTimeout(()=>openTarifModal(data,t),200);});
    Modal.getBody().querySelector('#delTarif').addEventListener('click',()=>{if(confirm('Bu tarifi silmek istiyor musun?')){data.tarifler=data.tarifler.filter(x=>x.id!==t.id);Store.save(data);render(data);Modal.close();}});
  }
  function openTarifModal(data,existing){
    const isEdit=!!existing;
    const t=existing||{id:Store.uid(),ad:'',kategori:'Öğle',sure:'',kalori:'',protein:'',karbonhidrat:'',yag:'',lif:'',vitamin_c:'',demir:'',kalsiyum:'',magnezyum:'',malzemeler:'',hazirlanis:'',notlar:''};
    Modal.open(isEdit?'Tarifi Düzenle':'Yeni Tarif',`
      <div class="form-group"><label class="form-label">Tarif Adı</label><input class="form-input" id="t_ad" value="${t.ad}" placeholder="Tavuk Salatası..."></div>
      <div class="form-row"><div class="form-group"><label class="form-label">Kategori</label><select class="form-select" id="t_kat">${['Kahvaltı','Öğle','Akşam','Ara Öğün','İçecek'].map(c=>`<option ${t.kategori===c?'selected':''}>${c}</option>`).join('')}</select></div><div class="form-group"><label class="form-label">Süre (dk)</label><input class="form-input" id="t_sure" type="number" value="${t.sure}" placeholder="30"></div></div>
      <div class="section-title">Makro Değerler</div>
      <div class="form-row"><div class="form-group"><label class="form-label">Kalori (kcal)</label><input class="form-input" id="t_kal" type="number" value="${t.kalori}" placeholder="450"></div><div class="form-group"><label class="form-label">Protein (g)</label><input class="form-input" id="t_pro" type="number" value="${t.protein||''}" placeholder="30"></div></div>
      <div class="form-row"><div class="form-group"><label class="form-label">Karbonhidrat (g)</label><input class="form-input" id="t_kar" type="number" value="${t.karbonhidrat||''}" placeholder="40"></div><div class="form-group"><label class="form-label">Yağ (g)</label><input class="form-input" id="t_yag" type="number" value="${t.yag||''}" placeholder="15"></div></div>
      <div class="section-title">Mikro Değerler <span style="font-weight:400;font-size:11px">(opsiyonel)</span></div>
      <div class="form-row"><div class="form-group"><label class="form-label">Lif (g)</label><input class="form-input" id="t_lif" type="number" value="${t.lif||''}"></div><div class="form-group"><label class="form-label">Vitamin C (mg)</label><input class="form-input" id="t_vitc" type="number" value="${t.vitamin_c||''}"></div></div>
      <div class="form-row"><div class="form-group"><label class="form-label">Demir (mg)</label><input class="form-input" id="t_dem" type="number" value="${t.demir||''}"></div><div class="form-group"><label class="form-label">Kalsiyum (mg)</label><input class="form-input" id="t_kals" type="number" value="${t.kalsiyum||''}"></div></div>
      <div class="form-group"><label class="form-label">Magnezyum (mg)</label><input class="form-input" id="t_mag" type="number" value="${t.magnezyum||''}"></div>
      <div class="section-title">Tarif Detayları</div>
      <div class="form-group"><label class="form-label">Malzemeler</label><textarea class="form-textarea" id="t_malz" placeholder="- 200g tavuk&#10;- ...">${t.malzemeler}</textarea></div>
      <div class="form-group"><label class="form-label">Hazırlanışı</label><textarea class="form-textarea" id="t_haz" style="min-height:120px" placeholder="1. ...">${t.hazirlanis}</textarea></div>
      <div class="form-group"><label class="form-label">Notlar</label><textarea class="form-textarea" id="t_not" placeholder="İpuçları...">${t.notlar||''}</textarea></div>
      <button class="btn btn-accent btn-full" id="saveTarif">${isEdit?'Güncelle':'Tarifi Ekle'}</button>`);
    Modal.getBody().querySelector('#saveTarif').addEventListener('click',()=>{
      t.ad=document.getElementById('t_ad').value;if(!t.ad){alert('Tarif adı zorunlu!');return;}
      t.kategori=document.getElementById('t_kat').value;t.sure=document.getElementById('t_sure').value;t.kalori=document.getElementById('t_kal').value;t.protein=document.getElementById('t_pro').value;t.karbonhidrat=document.getElementById('t_kar').value;t.yag=document.getElementById('t_yag').value;t.lif=document.getElementById('t_lif').value;t.vitamin_c=document.getElementById('t_vitc').value;t.demir=document.getElementById('t_dem').value;t.kalsiyum=document.getElementById('t_kals').value;t.magnezyum=document.getElementById('t_mag').value;t.malzemeler=document.getElementById('t_malz').value;t.hazirlanis=document.getElementById('t_haz').value;t.notlar=document.getElementById('t_not').value;
      if(isEdit){const idx=data.tarifler.findIndex(x=>x.id===t.id);if(idx!==-1)data.tarifler[idx]=t;}else data.tarifler.push(t);
      Store.save(data);render(data);Modal.close();
    });
  }
  return{render};
})();

// ===== PAGE: ALIŞVERİŞ =====
const PageAlisveris=(()=>{
  function render(data){
    const el=document.getElementById('page-alisveris');
    const liste=data.alisveris||[];
    const checked=liste.filter(i=>i.checked).length;
    el.innerHTML=`
      <div class="flex-between" style="margin-bottom:4px"><div style="font-family:var(--font-display);font-size:22px;font-weight:800">Alışveriş 🛒</div><button class="btn btn-accent btn-sm" id="addItem">+ Ekle</button></div>
      <div class="text-muted" style="margin-bottom:12px">${checked}/${liste.length} tamamlandı</div>
      ${liste.length>0?`<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap"><button class="btn btn-sm btn-outline" id="clearChk">✓ Yapıldıları Temizle</button><button class="btn btn-sm btn-outline" id="clearAll">🗑️ Tümünü Sil</button></div>`:''}
      <div id="shopList">${renderList(data)}</div>`;
    el.querySelector('#addItem')?.addEventListener('click',()=>openItemModal(data));
    el.querySelector('#clearChk')?.addEventListener('click',()=>{data.alisveris=data.alisveris.filter(i=>!i.checked);Store.save(data);render(data);});
    el.querySelector('#clearAll')?.addEventListener('click',()=>{if(confirm('Tüm liste silinsin mi?')){data.alisveris=[];Store.save(data);render(data);}});
    attachListEvents(el,data);
  }
  function renderList(data){
    const liste=data.alisveris||[];
    if(!liste.length)return`<div class="empty-state"><div class="empty-icon">🛒</div><div class="empty-title">Liste boş</div><div class="empty-desc">+ Ekle butonuyla liste oluştur.</div></div>`;
    const g={};liste.forEach(item=>{const c=item.kategori||'Diğer';if(!g[c])g[c]=[];g[c].push(item);});
    return Object.entries(g).map(([cat,items])=>`<div style="margin-bottom:16px"><div class="section-title">${cat}</div>${items.map(item=>`<div class="shop-item ${item.checked?'checked':''}" data-id="${item.id}"><div class="shop-check ${item.checked?'checked':''}" data-id="${item.id}">${item.checked?'✓':''}</div><span class="shop-item-name">${item.ad}</span>${item.miktar?`<span class="shop-item-qty">${item.miktar}</span>`:''}<button class="icon-btn eitm" data-id="${item.id}" style="font-size:13px;flex-shrink:0">✏️</button></div>`).join('')}</div>`).join('');
  }
  function attachListEvents(el,data){
    el.querySelectorAll('.shop-check').forEach(chk=>{chk.addEventListener('click',()=>{const item=data.alisveris.find(i=>i.id===chk.dataset.id);if(item){item.checked=!item.checked;Store.save(data);el.querySelector('#shopList').innerHTML=renderList(data);attachListEvents(el,data);}});});
    el.querySelectorAll('.eitm').forEach(btn=>{btn.addEventListener('click',e=>{e.stopPropagation();const item=data.alisveris.find(i=>i.id===btn.dataset.id);if(item)openItemModal(data,item);});});
  }
  function openItemModal(data,existing){
    const isEdit=!!existing;
    const item=existing||{id:Store.uid(),ad:'',miktar:'',kategori:'Market',checked:false};
    Modal.open(isEdit?'Ürünü Düzenle':'Ürün Ekle',`
      <div class="form-group"><label class="form-label">Ürün Adı</label><input class="form-input" id="s_ad" value="${item.ad}" placeholder="Yoğurt, Tavuk..."></div>
      <div class="form-row"><div class="form-group"><label class="form-label">Miktar</label><input class="form-input" id="s_mik" value="${item.miktar}" placeholder="2 kg, 1 adet..."></div><div class="form-group"><label class="form-label">Kategori</label><select class="form-select" id="s_kat">${['Market','Manav','Et & Balık','Süt & Kahvaltılık','İçecek','Temizlik','Diğer'].map(c=>`<option ${item.kategori===c?'selected':''}>${c}</option>`).join('')}</select></div></div>
      <div style="display:flex;gap:8px"><button class="btn btn-accent" style="flex:1" id="saveItem">${isEdit?'Güncelle':'Ekle'}</button>${isEdit?'<button class="btn btn-danger" id="delItem">Sil</button>':''}</div>`);
    Modal.getBody().querySelector('#saveItem').addEventListener('click',()=>{const ad=document.getElementById('s_ad').value.trim();if(!ad){alert('Ürün adı zorunlu!');return;}item.ad=ad;item.miktar=document.getElementById('s_mik').value;item.kategori=document.getElementById('s_kat').value;if(isEdit){const idx=data.alisveris.findIndex(i=>i.id===item.id);if(idx!==-1)data.alisveris[idx]=item;}else data.alisveris.push(item);Store.save(data);render(data);Modal.close();});
    Modal.getBody().querySelector('#delItem')?.addEventListener('click',()=>{data.alisveris=data.alisveris.filter(i=>i.id!==item.id);Store.save(data);render(data);Modal.close();});
  }
  return{render};
})();

// ===== APP =====
document.addEventListener('DOMContentLoaded',()=>{
  let data=Store.load();
  Theme.init(data.settings?.theme||'auto');
  renderAll();
  document.querySelectorAll('.nav-btn').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById('page-'+btn.dataset.page).classList.add('active');});});
  document.getElementById('themeToggle').addEventListener('click',()=>{const t=Theme.toggle();if(!data.settings)data.settings={};data.settings.theme=t;Store.save(data);});
  document.getElementById('exportBtn').addEventListener('click',()=>Store.exportJSON(data));
  document.getElementById('importBtn').addEventListener('click',()=>document.getElementById('importFile').click());
  document.getElementById('importFile').addEventListener('change',e=>{const file=e.target.files[0];if(!file)return;Store.importJSON(file,(err,parsed)=>{if(err){alert('Hata: '+err.message);return;}if(confirm('Mevcut veriler silinecek. Devam edilsin mi?')){data=parsed;Store.save(data);renderAll();alert('✅ Yedek yüklendi!');}});e.target.value='';});
  function renderAll(){data=Store.load();PageGenel.render(data);PageSpor.render(data);PageTarifler.render(data);PageAlisveris.render(data);}
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr" data-theme="auto">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>FitApp - Premium</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/@phosphor-icons/web"></script>
<style>
:root{--bg:#f8f9fa;--surface:#ffffff;--surface-2:#f1f3f5;--text:#121417;--text-secondary:#68717a;--accent:#e8501a;--accent-light:#fdece6;--border:#e9ecef;--radius-lg:24px;--radius-md:16px;--shadow:0 8px 20px rgba(0,0,0,0.04)}
[data-theme="dark"]{--bg:#0f1113;--surface:#181a1d;--surface-2:#222529;--text:#f8f9fa;--text-secondary:#adb5bd;--border:#2c3036;--shadow:0 8px 20px rgba(0,0,0,0.2)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);padding-bottom:110px;transition:0.3s}
.container{max-width:480px;margin:0 auto;padding:20px}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;padding-top:10px}
.header h1{font-family:'Syne',sans-serif;font-weight:800;font-size:30px;letter-spacing:-1px}
.btn-group{display:flex;gap:8px}
.icon-btn{width:42px;height:42px;border-radius:12px;border:1px solid var(--border);background:var(--surface);color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:0.2s}
.icon-btn:active{transform:scale(0.95);background:var(--surface-2)}
.icon-btn.reset{color:var(--red);border-color:rgba(229,57,53,0.2)}
.card{background:var(--surface);border-radius:var(--radius-lg);padding:24px;border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:20px}
.card-title{font-family:'Syne',sans-serif;font-weight:700;font-size:18px;margin-bottom:18px;display:flex;align-items:center;gap:10px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:16px;text-align:center}
.stat-label{font-size:12px;color:var(--text-secondary);font-weight:600;text-transform:uppercase;margin-bottom:4px}
.stat-value{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--accent)}
input, select{width:100%;background:var(--surface-2);border:1.5px solid transparent;padding:14px;border-radius:14px;font-family:inherit;font-size:15px;color:var(--text);transition:0.2s;outline:none}
input:focus{border-color:var(--accent);background:var(--surface)}
.input-label{display:block;font-size:13px;font-weight:600;margin-bottom:8px;margin-left:4px;color:var(--text-secondary)}
.primary-btn{width:100%;background:var(--text);color:var(--bg);border:none;padding:16px;border-radius:16px;font-weight:700;font-size:16px;cursor:pointer;transition:0.2s;display:flex;align-items:center;justify-content:center;gap:8px}
.primary-btn:active{transform:scale(0.98);opacity:0.9}
.list-item{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.list-info h4{font-size:15px;font-weight:600}
.list-info p{font-size:13px;color:var(--text-secondary)}
.delete-btn{color:#ff4b4b;background:none;border:none;padding:8px;cursor:pointer;font-size:20px}
.nav-bar{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);width:90%;max-width:400px;background:rgba(var(--text-rgb, 18, 20, 23), 0.05);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);background:var(--surface);border:1px solid var(--border);border-radius:30px;display:flex;padding:8px;box-shadow:0 10px 30px rgba(0,0,0,0.1);z-index:1000}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px;color:var(--text-secondary);cursor:pointer;transition:0.2s;border-radius:22px;gap:4px}
.nav-item i{font-size:22px}
.nav-item span{font-size:10px;font-weight:700}
.nav-item.active{color:var(--accent);background:var(--accent-light)}
.page{display:none;animation:fadeIn 0.4s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.photo-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.photo-card{position:relative;border-radius:16px;overflow:hidden;aspect-ratio:1;border:1px solid var(--border)}
.photo-card img{width:100%;height:100%;object-fit:cover}
.photo-date{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent, rgba(0,0,0,0.7));color:white;font-size:10px;padding:8px;text-align:center}
.photo-remove{position:absolute;top:8px;right:8px;background:rgba(255,75,75,0.9);color:white;width:24px;height:24px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer}
</style>
</head>
<body>
<div class="container">
    <header class="header">
        <h1>FitApp</h1>
        <div class="btn-group">
            <button class="icon-btn" id="themeToggle"><i class="ph-bold ph-moon"></i></button>
            <button class="icon-btn" id="exportBtn"><i class="ph-bold ph-download-simple"></i></button>
            <button class="icon-btn" id="importBtn"><i class="ph-bold ph-upload-simple"></i></button>
            <button class="icon-btn reset" onclick="App.resetAll()" title="Sıfırla"><i class="ph-bold ph-trash"></i></button>
            <input type="file" id="importFile" style="display:none" accept=".json"/>
        </div>
    </header>

    <div id="page-home" class="page active">
        <div class="card" style="background:var(--accent); border:none">
            <h2 style="color:white; font-family:'Syne'">Hoş Geldin! 👋</h2>
            <p style="color:rgba(255,255,255,0.8); font-size:14px; margin-top:8px">Bugün hedeflerine bir adım daha yakınsın.</p>
        </div>
        <div class="stat-grid">
            <div class="stat-card">
                <div class="stat-label">Günlük Kalori</div>
                <div class="stat-value" id="sum-cal">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Son Kilo</div>
                <div class="stat-value" id="sum-weight">-</div>
            </div>
        </div>
    </div>

    <div id="page-workout" class="page">
        <div class="card">
            <h3 class="card-title"><i class="ph-bold ph-barbell"></i> Antrenman</h3>
            <input type="text" id="w-name" placeholder="Egzersiz adı..." style="margin-bottom:12px">
            <div class="grid-2" style="margin-bottom:16px">
                <input type="number" id="w-sets" placeholder="Set">
                <input type="number" id="w-reps" placeholder="Tekrar">
            </div>
            <button class="primary-btn" onclick="Workout.add()">Ekle</button>
        </div>
        <div id="workout-list"></div>
    </div>

    <div id="page-diet" class="page">
        <div class="card">
            <h3 class="card-title"><i class="ph-bold ph-bowl-food"></i> Beslenme</h3>
            <input type="text" id="d-name" placeholder="Ne yedin?" style="margin-bottom:12px">
            <input type="number" id="d-cal" placeholder="Kalori (kcal)" style="margin-bottom:16px">
            <button class="primary-btn" onclick="Diet.add()">Kaydet</button>
        </div>
        <div id="diet-list"></div>
    </div>

    <div id="page-body" class="page">
        <div class="card">
            <h3 class="card-title"><i class="ph-bold ph-chart-line-up"></i> Ölçümler</h3>
            <label class="input-label">Vücut Ağırlığı (kg)</label>
            <input type="number" id="b-weight" step="0.1" placeholder="70.5" style="margin-bottom:12px">
            <div class="grid-2" style="margin-bottom:16px">
                <div>
                    <label class="input-label">Yağ %</label>
                    <input type="number" id="b-fat" step="0.1" placeholder="15">
                </div>
                <div>
                    <label class="input-label">Bel (cm)</label>
                    <input type="number" id="b-waist" step="0.1" placeholder="80">
                </div>
            </div>
            <button class="primary-btn" onclick="Body.add()">Kaydı Tamamla</button>
        </div>
        <div id="body-list"></div>
    </div>

    <div id="page-photos" class="page">
        <div class="card">
            <h3 class="card-title"><i class="ph-bold ph-camera"></i> Galeri</h3>
            <input type="file" id="photo-input" accept="image/*" style="display:none">
            <button class="primary-btn" onclick="document.getElementById('photo-input').click()">
                <i class="ph-bold ph-plus-circle"></i> Yeni Fotoğraf
            </button>
        </div>
        <div id="photo-grid" class="photo-grid"></div>
    </div>
</div>

<nav class="nav-bar">
    <div class="nav-item active" onclick="App.nav('home', this)"><i class="ph-fill ph-house"></i><span>Ev</span></div>
    <div class="nav-item" onclick="App.nav('workout', this)"><i class="ph-fill ph-barbell"></i><span>Spor</span></div>
    <div class="nav-item" onclick="App.nav('diet', this)"><i class="ph-fill ph-fork-knife"></i><span>Diyet</span></div>
    <div class="nav-item" onclick="App.nav('body', this)"><i class="ph-fill ph-chart-line-up"></i><span>Vücut</span></div>
    <div class="nav-item" onclick="App.nav('photos', this)"><i class="ph-fill ph-image"></i><span>Foto</span></div>
</nav>

<script>
const Store = {
    get: () => JSON.parse(localStorage.getItem('fitapp_pro')) || {w:[], d:[], b:[], p:[]},
    set: (data) => localStorage.setItem('fitapp_pro', JSON.stringify(data)),
    clear: () => localStorage.removeItem('fitapp_pro')
};

const App = {
    nav: (id, el) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page-'+id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
    },
    resetAll: () => {
        if(confirm('Tüm verileriniz kalıcı olarak silinecek. Emin misiniz?')) {
            Store.clear(); location.reload();
        }
    },
    init: () => {
        const data = Store.get();
        document.getElementById('sum-cal').innerText = data.d.reduce((a,b)=>a+Number(b.c),0);
        document.getElementById('sum-weight').innerText = data.b.length ? data.b[data.b.length-1].w + ' kg' : '-';
        Workout.render(); Diet.render(); Body.render(); Photos.render();
    }
};

const Workout = {
    add: () => {
        const n = document.getElementById('w-name').value, s = document.getElementById('w-sets').value, r = document.getElementById('w-reps').value;
        if(!n) return;
        const data = Store.get(); data.w.push({id:Date.now(), n, s, r}); Store.set(data);
        App.init(); document.getElementById('w-name').value='';
    },
    delete: (id) => {
        const data = Store.get(); data.w = data.w.filter(x=>x.id!==id); Store.set(data); App.init();
    },
    render: () => {
        const data = Store.get();
        document.getElementById('workout-list').innerHTML = data.w.map(i => `
            <div class="list-item">
                <div class="list-info"><h4>${i.n}</h4><p>${i.s} Set x ${i.r} Tekrar</p></div>
                <button class="delete-btn" onclick="Workout.delete(${i.id})"><i class="ph-bold ph-trash"></i></button>
            </div>`).join('');
    }
};

const Diet = {
    add: () => {
        const n = document.getElementById('d-name').value, c = document.getElementById('d-cal').value;
        if(!n || !c) return;
        const data = Store.get(); data.d.push({id:Date.now(), n, c}); Store.set(data);
        App.init(); document.getElementById('d-name').value=''; document.getElementById('d-cal').value='';
    },
    delete: (id) => {
        const data = Store.get(); data.d = data.d.filter(x=>x.id!==id); Store.set(data); App.init();
    },
    render: () => {
        const data = Store.get();
        document.getElementById('diet-list').innerHTML = data.d.map(i => `
            <div class="list-item">
                <div class="list-info"><h4>${i.n}</h4><p>${i.c} kcal</p></div>
                <button class="delete-btn" onclick="Diet.delete(${i.id})"><i class="ph-bold ph-trash"></i></button>
            </div>`).join('');
    }
};

const Body = {
    add: () => {
        const w = document.getElementById('b-weight').value, f = document.getElementById('b-fat').value, wa = document.getElementById('b-waist').value;
        if(!w) return;
        const data = Store.get(); data.b.push({id:Date.now(), date:new Date().toLocaleDateString('tr-TR'), w, f, wa});
        Store.set(data); App.init();
    },
    delete: (id) => {
        const data = Store.get(); data.b = data.b.filter(x=>x.id!==id); Store.set(data); App.init();
    },
    render: () => {
        const data = Store.get();
        document.getElementById('body-list').innerHTML = data.b.slice().reverse().map(i => `
            <div class="list-item">
                <div class="list-info"><h4>${i.w} kg</h4><p>${i.date} • %${i.f} Yağ • ${i.wa}cm Bel</p></div>
                <button class="delete-btn" onclick="Body.delete(${i.id})"><i class="ph-bold ph-trash"></i></button>
            </div>`).join('');
    }
};

const Photos = {
    add: (base64) => {
        const data = Store.get(); data.p.push({id:Date.now(), src:base64, date:new Date().toLocaleDateString('tr-TR')});
        Store.set(data); App.init();
    },
    delete: (id) => {
        if(confirm('Fotoğraf silinsin mi?')) {
            const data = Store.get(); data.p = data.p.filter(x=>x.id!==id); Store.set(data); App.init();
        }
    },
    render: () => {
        const data = Store.get();
        document.getElementById('photo-grid').innerHTML = data.p.slice().reverse().map(i => `
            <div class="photo-card">
                <img src="${i.src}">
                <button class="photo-remove" onclick="Photos.delete(${i.id})">×</button>
                <div class="photo-date">${i.date}</div>
            </div>`).join('');
    }
};

document.getElementById('photo-input').onchange = (e) => {
    const reader = new FileReader();
    reader.onload = () => Photos.add(reader.result);
    reader.readAsDataURL(e.target.files[0]);
};

document.getElementById('themeToggle').onclick = () => {
    const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', t);
};

document.getElementById('exportBtn').onclick = () => {
    const blob = new Blob([JSON.stringify(Store.get())], {type:'application/json'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'fitapp_pro_backup.json'; a.click();
};

document.getElementById('importBtn').onclick = () => document.getElementById('importFile').click();
document.getElementById('importFile').onchange = (e) => {
    const reader = new FileReader();
    reader.onload = (ev) => { Store.set(JSON.parse(ev.target.result)); location.reload(); };
    reader.readAsText(e.target.files[0]);
};

App.init();
</script>
</body>
</html>
